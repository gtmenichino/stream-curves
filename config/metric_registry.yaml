# ── Metric Registry ─────────────────────────────────────────────────────────
# Defines all metrics for the StreamCurves geomorphic reference-curve analysis.
# Each entry specifies metric properties, allowed predictors/stratifications,
# and analysis configuration.

perRiffle:
  display_name: "Percent Riffle"
  column_name: "perRiffle"
  units: "%"
  metric_family: proportion
  higher_is_better: true
  monotonic_linear: true
  allowed_predictors:
    - DA_km2
    - Slope_per
    - LWD_frequency
    - L_Bufferwidth
    - R_Bufferwidth
    - Per_erodingbank
    - d50
  allowed_stratifications:
    - Ecoregion
    - DACAT
    - Ecoregion_x_DACAT
    - StreamType2
    - valleytype
    - Bedmaterial
  preferred_transform: none
  min_sample_size: 10
  best_subsets_allowed: true
  count_model: false
  stratification_mode: subset
  include_in_summary: true
  notes: "Proof-of-concept metric; prototype already exists"

